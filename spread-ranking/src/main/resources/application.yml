server:
  port: 8083

spring:
  application:
    name: transformation-service

  kafka:
    # Use 'redpanda:29092' for internal Docker communication
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:redpanda:29092}

    consumer:
      group-id: transformation-group
      auto-offset-reset: earliest
      # Safety first: Protect against malformed JSON
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        # Broaden trust to allow events and models
        spring.json.trusted.packages: "com.chainbridge.*"
        # Tells the deserializer exactly what class to expect from 'raw-transactions'
        spring.json.value.default.type: "com.chainbridge.common.model.RawTransaction"

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        # Crucial: Injector service needs these headers to know it's a ProcessedTransaction
        spring.json.add.type.headers: true

logging:
  level:
    # Keep these on DEBUG initially to watch the Retry/DLT logic in action
    org.springframework.kafka.retrytopic: DEBUG
    org.springframework.kafka.support.serializer: DEBUG
    com.chainbridge.transformation: DEBUG
    org.apache.kafka.clients.consumer.ConsumerConfig: WARN
