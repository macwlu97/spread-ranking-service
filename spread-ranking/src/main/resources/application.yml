server:
  port: 8083

spring:
  application:
    name: spread-ranking-service
  threads:
    virtual:
      enabled: true

logging:
  level:
    root: INFO
    com.platform.spreadranking: DEBUG
    org.springframework.web: INFO

kanga:
  api:
    base-url: https://public.kanga.exchange/api

security:
  bearer-token: ABC123

resilience4j:
  retry:
    instances:
      kangaApi: # Dla KangaMarketAdapter
        maxAttempts: 3
        waitDuration: 500ms
        retryExceptions:
          - java.io.IOException
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
      kangaOrderBook: # Dla KangaOrderBookAdapter
        maxAttempts: 3
        waitDuration: 200ms
        retryExceptions:
          - java.io.IOException
          - org.springframework.web.client.ResourceAccessException

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html